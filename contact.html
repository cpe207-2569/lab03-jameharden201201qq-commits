<!doctype html>

  <head>

    />

    <style>
      .profile-img {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 50%;
      }
      .custom-card-img {
        height: 220px;
        object-fit: cover;
        border-top-left-radius: 1rem !important;
        border-top-right-radius: 1rem !important;
      }
      .contact-label {
        width: 140px;
        font-weight: 500;
        font-size: 1.25rem;
        vertical-align: top;
        padding-right: 2.5rem;
        padding-bottom: 1.2rem;
      }
      .contact-value {
        font-size: 1.25rem;
        color: #6c757d;
        vertical-align: top;
        padding-bottom: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div
      class="row w-100 py-3 bg-dark text-white text-center m-0 justify-content-around align-items-center shadow-sm"
    >
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          <a href="index.html"></a>
          Home
        </button>
      </div>
      <div class="col">

      >
        <div class="col-12 col-md-5 text-center mb-4 mb-md-0">
          <img
            src="/workLab3/images/profile.jpg"
            class="profile-img shadow"
            alt="My picture"

        <div class="col-12 col-md-7 px-4">
          <table class="w-100">
            <tr>
              <td class="contact-label">Name</td>
              <td class="contact-value">Natthanan Sueamaun</td>

              <td class="contact-value">Poom</td>
            </tr>
            <tr>
              <td class="contact-label">Facebook</td>
              <td class="contact-value">
                <a
                  href="https://www.facebook.com/nuttanan.sueaman.3"
                  target="_blank"
                  class="text-primary text-decoration-underline"
                >
                  https://www.facebook.com/nuttanan.sueaman.3
                </a>
              </td>
            </tr>
            <tr>
              <td class="contact-label">Email</td>
              <td class="contact-value">
                <a
                  href="mailto:natthanan_sueamun@cmu.ac.th"
                  class="text-primary text-decoration-underline"
                >
                  natthanan_sueamun@cmu.ac.th
                </a>
              </td>
            </tr>
          </table>
        </div>
