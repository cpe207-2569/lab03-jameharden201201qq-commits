<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .main-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .container-fluid {
        flex: 1;
        display: flex;
        align-items: stretch;
      }
      .row {
        width: 100%;
      }
      .custom-card {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .custom-card-img {
        height: 70%;
        object-fit: cover;
        border-top-left-radius: 1rem !important;
        border-top-right-radius: 1rem !important;
      }
      .custom-card-body {
        height: 30%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      class="row w-100 py-3 bg-dark text-white text-center m-0 justify-content-around align-items-center shadow-sm"
    >
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Home
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Favorite
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Gallery
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Contact
        </button>
      </div>
    </div>

    <div class="main-wrapper">
      <div class="text-center mt-4"><h2>FAVORITE</h2></div>

      <div class="container-fluid px-5 my-4">
        <div class="row g-4 justify-content-center m-0">
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="/workLab3/images/eaa528077ced29385ef00537194ffeff.webp"
                class="card-img-top custom-card-img"
                alt=""
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-2">Magician</h4>
                <p class="card-text text-muted small">
                  Kyrie is my favorite NBA player. He is so fast and cool
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="/workLab3/images/0x1900-000000-80-0-0.jpg"
                class="card-img-top custom-card-img"
                alt="Circuit"
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-2">Parkinson</h4>
                <p class="card-text text-muted small">
                  This music band is the best
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="/workLab3/images/breaking_bad_4.webp"
                class="card-img-top custom-card-img"
                alt="Nanotechnology Research"
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-2">Breaking Bad</h4>
                <p class="card-text text-muted small">
                  No one don't know this movie, the best reviewed serie.
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="/workLab3/images/oardefault.jpg"
                class="card-img-top custom-card-img"
                alt="New Favorite"
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-2">Pad Kra Pao</h4>
                <p class="card-text text-muted small">
                  I love eating this dish -_-
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
