<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .custom-card-img {
        height: 220px;
        object-fit: cover;
        border-top-left-radius: 1rem !important;
        border-top-right-radius: 1rem !important;
      }
    </style>
  </head>
  <body>
    <div
      class="row w-100 py-3 bg-dark text-white text-center m-0 justify-content-around align-items-center shadow-sm"
    >
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Home
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Favorite
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          Gallery
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">

        </button>
      </div>
    </div>
    <br />
    <div class="text-center"><h2>FAVORITE</h2></div>

    <div class="container my-5">
      <div class="row g-5 justify-content-center">
        <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
          <div
            class="card rounded-4 border-0 shadow w-100"
            style="max-width: 26rem"
          >
            <img
              src="/workLab3/images/istockphoto-871030872-612x612.jpg"
              class="card-img-top custom-card-img"
              alt="Programming"
            />
            <div class="card-body p-4 fs-5">
              <h4 class="card-title fw-semibold mb-3">Programming</h4>
              <p class="card-text text-muted">
                I have learned the basics of C++ and am currently starting to
                study web development.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
