<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .main-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .container-fluid {
        flex: 1;
        display: flex;
        align-items: stretch;
      }
      .row {
        width: 100%;
      }
      .nav-link-btn {
        text-decoration: none;
        color: inherit;
        display: block;
        width: 100%;
        height: 100%;
      }
      /* ปรับขนาดการ์ดและรูปให้เท่ากับหน้า Favorite (สัดส่วนรูป 70% และตัวหนังสือ 30%) */
      .custom-card {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .custom-card-img {
        height: 70%;
        object-fit: cover;
        border-top-left-radius: 1rem !important;
        border-top-right-radius: 1rem !important;
      }
      .custom-card-body {
        height: 30%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      class="row w-100 py-3 bg-dark text-white text-center m-0 justify-content-around align-items-center shadow-sm"
    >
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          <a href="index.html" class="nav-link-btn">Home</a>
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          <a href="Favorite.html" class="nav-link-btn">Favorite</a>
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          <a href="Gallery.html" class="nav-link-btn">Gallery</a>
        </button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100 fs-4 fw-medium py-2">
          <a href="contact.html" class="nav-link-btn">Contact</a>
        </button>
      </div>
    </div>

    <div class="main-wrapper">
      <div class="text-center mt-4"><h2>Gallery</h2></div>

      <div class="container-fluid px-5 my-4">
        <div class="row g-4 justify-content-center m-0">
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="./images/e74b35d5-1dc3-4ddb-ba1c-515fd8f8081c (1).jpg"
                class="card-img-top custom-card-img"
                alt=""
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-1 fs-5">Nerd Version</h4>
                <p class="card-text text-muted small lh-sm">So nervous</p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="./images/61050052-927b-4137-ae39-03b46bcca85e (1).jpg"
                class="card-img-top custom-card-img"
                alt="Krabi Trip"
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-1 fs-5">Run Time</h4>
                <p class="card-text text-muted small lh-sm">
                  Come with me pleaseeeee
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="./images/16546d69-a13d-4600-8757-7ced98506a23 (1).jpg"
                class="card-img-top custom-card-img"
                alt=""
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-1 fs-5">Sutep Tip</h4>
                <p class="card-text text-muted small lh-sm">
                  Let drive a motorcycle go go go
                </p>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card custom-card rounded-4 border-0 shadow">
              <img
                src="./images/99b05aea-eda5-435f-81a2-c5bf3eeb6acb.jpg"
                class="card-img-top custom-card-img"
                alt="s"
              />
              <div class="card-body custom-card-body p-3 fs-5">
                <h4 class="card-title fw-semibold mb-1 fs-5">Bad Child</h4>
                <p class="card-text text-muted small lh-sm">Lolllllll noooo</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
