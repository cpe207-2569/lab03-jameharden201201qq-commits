<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      .profile-img {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div
      class="row w-100 p-3 mb-2 bg-dark text-white text-center m-0 justify-content-around"
    >
      <div class="col">
        <button type="button" class="btn btn-dark w-100">Home</button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100">Favorite</button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100">Gallery</button>
      </div>
      <div class="col">
        <button type="button" class="btn btn-dark w-100">Contact</button>
      </div>
    </div>

    <div class="container my-5">
      <div
        class="row align-items-center justify-content-center max-w-4xl mx-auto"
      >
        <div class="col-12 col-md-4 text-center mb-4 mb-md-0">
          <img
            src="/workLab3/images/profile.jpg"
            class="profile-img shadow-sm"
            alt="My picture"
          />
        </div>
        <div class="col-12 col-md-8 text-center text-md-start px-4">
          <h1 class="display-5 fw-normal mb-2 text-secondary-dark">
            Natthanan Sueaman
          </h1>
          <p class="fs-5 text-muted leading-relaxed">
            Hi, my name is Poom. I am studying at Chiang Mai University,
            majoring in Computer Engineering (CPE). I love playing basketball,
            gaming, and exercising.
          </p>
        </div>
      </div>
    </div>

    <div class="text-center"><h3>SKills</h3></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
